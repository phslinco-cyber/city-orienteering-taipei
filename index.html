        { name: "北投市場 矮仔財滷肉飯", lat: 25.1340, lon: 121.5005 }, { name: "石牌 無名手工蛋餅", lat: 25.1155, lon: 121.5150 }

    const allBreakfasts = [...baseBreakfasts];
    landmarkPool.forEach((lm, index) => {
        if (index < 75) {
            allBreakfasts.push({
                name: lm.name.replace("台北分館", "") + "周邊在地口碑早點",
                lat: lm.lat + (Math.random() - 0.5) * 0.005,
                lon: lm.lon + (Math.random() - 0.5) * 0.005
            });
        }
    });

    const nameAdjs = ["究極", "幻之", "沉浸式", "高能", "佛系", "硬核", "絕絕子", "逆天", "燃脂", "飆速", "熱血", "街頭", "極限", "探索"];
    const nameNouns = ["大暴走", "特搜巡禮", "終極挑戰", "迷航記", "大冒險", "狂飆路線", "生存戰", "拉練", "制霸", "任務", "突圍"];

    let finalRouteNames = []; 

    function getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371; 
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                  Math.sin(dLon/2) * Math.sin(dLon/2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return R * c;
    }

    function generateDynamicRoute() {
        const mode = document.getElementById('kmSelect').value;
        
        let targetStraightKm = 4.0;
        let biasZone = null;
        let biasStrength = 0;
        let maxPoints = 8;
        let exactPoints = false; 

        // 🌟 雙軌制探索邏輯啟動！
        if (mode === "5") { 
            targetStraightKm = 4.0; 
            maxPoints = 4; 
            exactPoints = true; 
            biasZone = ["W", "S", "E"]; // 死守市中心
            biasStrength = 0.9;
        }
        else if (mode === "8") { 
            targetStraightKm = 6.8; 
            maxPoints = 7; 
            biasZone = ["W", "S", "E"]; // 死守市中心
            biasStrength = 0.8;
        }
        else if (mode === "10") { 
            targetStraightKm = 8.8; 
            maxPoints = 8;
            biasZone = ["N", "N_E"]; // 解除封印！前往士林、北投、內湖、南港
            biasStrength = 0.75;
        }
        else if (mode === "15") { 
            targetStraightKm = 12.5; 
            maxPoints = 8;
            biasZone = ["N", "N_E"]; // 極限拓荒火力全開
            biasStrength = 0.85; 
        }

        let currentLat = 25.0330; 
        let currentLon = 121.5358;
        let totalDistance = 0;
        let availablePool = [...landmarkPool];
        let selectedPoints = [];
        finalRouteNames = [];

        let visitedCoords = [{ lat: currentLat, lon: currentLon }];

        while (selectedPoints.length < maxPoints) {
            if (!exactPoints && totalDistance >= targetStraightKm) {
                break;
            }

            let slotsLeft = maxPoints - selectedPoints.length;
            let distLeft = targetStraightKm - totalDistance;
            
            if (exactPoints && distLeft <= 0) {
                distLeft = 0.5 * slotsLeft; 
            }
            
            let targetStep = distLeft / slotsLeft;
            let minAllowed = targetStep * 0.4;
            let maxAllowed = targetStep * 2.0;

            if (slotsLeft === 1) {
                minAllowed = distLeft * 0.8;
                maxAllowed = distLeft * 1.5;
            }

            let candidates = availablePool.filter(p => {
                let d = getDistance(currentLat, currentLon, p.lat, p.lon);
                if (d < minAllowed || d > maxAllowed) return false;

                let tooCloseToHistory = visitedCoords.some(visited => {
                    return getDistance(p.lat, p.lon, visited.lat, visited.lon) < (minAllowed * 0.8);
                });
                
                return !tooCloseToHistory;
            });

            // 雙軌制區域引導權重
            if (biasZone && Math.random() < biasStrength && candidates.length > 0) {
                let priorityCandidates = candidates.filter(c => biasZone.includes(c.zone));
                if (priorityCandidates.length > 0) {
                    candidates = priorityCandidates;
                }
            }

            if (candidates.length === 0) {
                candidates = availablePool.filter(p => {
                    let d = getDistance(currentLat, currentLon, p.lat, p.lon);
                    return d >= minAllowed * 0.5 && d <= maxAllowed * 1.5;
                });
                if (candidates.length === 0) {
                    availablePool.sort((a, b) => {
                        let distA = Math.abs(getDistance(currentLat, currentLon, a.lat, a.lon) - targetStep);
                        let distB = Math.abs(getDistance(currentLat, currentLon, b.lat, b.lon) - targetStep);
                        return distA - distB;
                    });
                    candidates = [availablePool[0]];
                }
            }

            let chosen = candidates[Math.floor(Math.random() * candidates.length)];
            let dist = getDistance(currentLat, currentLon, chosen.lat, chosen.lon);
            
            totalDistance += dist;
            selectedPoints.push({ name: chosen.name, dist: dist.toFixed(1) });
            finalRouteNames.push(chosen.name);

            currentLat = chosen.lat;
            currentLon = chosen.lon;
            
            visitedCoords.push({ lat: currentLat, lon: currentLon });
            availablePool = availablePool.filter(p => p.name !== chosen.name);
        }

        let nearbyBreakfasts = allBreakfasts.filter(b => getDistance(currentLat, currentLon, b.lat, b.lon) <= 0.5);
        if (nearbyBreakfasts.length === 0) {
            nearbyBreakfasts = allBreakfasts.filter(b => getDistance(currentLat, currentLon, b.lat, b.lon) <= 1.0);
        }
        
        let chosenBreakfast = nearbyBreakfasts[Math.floor(Math.random() * nearbyBreakfasts.length)];
        let bDist = getDistance(currentLat, currentLon, chosenBreakfast.lat, chosenBreakfast.lon);

        let randomName = nameAdjs[Math.floor(Math.random() * nameAdjs.length)] + nameNouns[Math.floor(Math.random() * nameNouns.length)];

        let htmlContent = `
            <div class="stats-badge">📜 ${randomName} (直線累積 ${totalDistance.toFixed(1)}K)</div>
            <div class="warning-text">
                ⚠️ 貼心提醒：加上街道折返，實際跑量約為直線的 1.15~1.2 倍。<br>
                今天這趟跑完，手錶剛好會跳到 ${mode} 公里左右喔！
            </div>
            <ul class="point-list">
                <li class="point-item">
                    <span class="p-name">📍 起點：大安森林公園</span>
                    <span class="p-dist">START</span>
                </li>
        `;
        
        selectedPoints.forEach((p, index) => {
            htmlContent += `
                <li class="point-item">
                    <span class="p-name">📸 CP ${index + 1}：${p.name}</span>
                    <span class="p-dist">+${p.dist}K</span>
                </li>
            `;
        });
        
        htmlContent += `
            </ul>
            <div class="breakfast-box">
                🍳 終點補給：${chosenBreakfast.name}<br>
                <span style="font-size: 0.82em; color: #f1f2f6;">(距離最後一站僅 ${(bDist*1000).toFixed(0)} 公尺，馬上吃到！)</span>
            </div>
        `;
        
        const displayDiv = document.getElementById('routeDisplay');
        const googleBtn = document.getElementById('googleBtn');
        
        displayDiv.style.display = 'none';
        googleBtn.style.display = 'none';
        
        setTimeout(() => {
            displayDiv.innerHTML = htmlContent;
            displayDiv.style.display = 'block';
            googleBtn.style.display = 'block';
        }, 50);
    }

    function openGoogleMaps() {
        if (finalRouteNames.length === 0) return;
        const origin = encodeURIComponent("台北大安森林公園");
        const destination = encodeURIComponent("台北 " + finalRouteNames[finalRouteNames.length - 1]);
        let waypointsArr = [];
        for(let i = 0; i < finalRouteNames.length - 1; i++) {
            waypointsArr.push(encodeURIComponent("台北 " + finalRouteNames[i]));
        }
        const waypoints = waypointsArr.join('|');
        const url = `https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${destination}&waypoints=${waypoints}&travelmode=walking`;
        window.open(url, '_blank');
    }
</script>
