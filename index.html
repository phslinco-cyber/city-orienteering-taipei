<body>

<div class="container">
    <h1>🌻 台中種花定向盲盒</h1>
    <div class="subtitle">東海大學出發・邊跑邊種花探索版</div>

    <div class="control-panel">
        <label for="kmSelect">🎯 設定今日目標里程：</label>
        <select id="kmSelect">
            <option value="5">5 公里 (東海校園恢復跑)</option>
            <option value="8">8 公里 (西屯逢甲配速跑)</option>
            <option value="10" selected>10 公里 (跨區花園挑戰)</option>
            <option value="15">15 公里 (台中市區拓荒 LSD)</option>
        </select>
        <button class="btn" onclick="generateDynamicRoute()">⚡ 一鍵生成種花任務卡</button>
    </div>

    <div id="routeDisplay" class="route-card"></div>

    <button id="plantBtn" class="btn-plant" onclick="plantCurrentRoute()">🌱 完成路線・種下這趟的花</button>
    <button id="shareBtn" class="btn-share" onclick="shareRoute()">🔗 分享這條路線</button>
    <button id="googleBtn" class="btn-google" onclick="openGoogleMaps()">🗺️ 一鍵轉拋 Google Maps 導航</button>

    <div id="gardenPanel" class="garden-panel"></div>
    <div id="codexBox" class="codex"></div>
</div>

<div id="toast" class="toast"></div>

<script>
    // 起點：東海大學。座標為近似值（適用盲盒估算），可再校正。
    const START = { name: "東海大學", lat: 24.1817, lon: 120.6017 };

    // zone 分區：TH=東海/西屯核心、CENTRAL=中西區市中心、S=南屯、N=北屯、FLOWER=花海遠征、COAST=海線
    const landmarkPool = [
        // 東海 / 西屯核心 (TH) — 離起點最近
        { name: "東海大學路思義教堂", lat: 24.1795, lon: 120.6016, zone: "TH", flower: true },
        { name: "東海大學文理大道", lat: 24.1806, lon: 120.6030, zone: "TH" },
        { name: "東海乳品小棧", lat: 24.1838, lon: 120.5992, zone: "TH" },
        { name: "東海藝術街商圈", lat: 24.1832, lon: 120.6082, zone: "TH" },
        { name: "東海別墅商圈", lat: 24.1806, lon: 120.6100, zone: "TH" },
        { name: "台中都會公園", lat: 24.2007, lon: 120.5940, zone: "TH", flower: true },
        { name: "望高寮夜景公園", lat: 24.1652, lon: 120.5978, zone: "TH" },
        { name: "鞋寶觀光工廠", lat: 24.1905, lon: 120.6205, zone: "TH" },
        { name: "逢甲夜市文華路", lat: 24.1785, lon: 120.6467, zone: "TH" },
        { name: "逢甲大學", lat: 24.1793, lon: 120.6470, zone: "TH" },
        { name: "秋紅谷生態公園", lat: 24.1663, lon: 120.6390, zone: "TH", flower: true },
        { name: "台中國家歌劇院", lat: 24.1626, lon: 120.6407, zone: "TH" },
        { name: "市政市民廣場", lat: 24.1615, lon: 120.6470, zone: "TH" },
        { name: "中央公園(水湳)", lat: 24.1970, lon: 120.6420, zone: "TH", flower: true },
        { name: "惠來公園", lat: 24.1652, lon: 120.6440, zone: "TH", flower: true },
        { name: "福星公園", lat: 24.1680, lon: 120.6360, zone: "TH", flower: true },
        { name: "朝馬運動公園", lat: 24.1640, lon: 120.6350, zone: "TH", flower: true },
        { name: "東海大學農牧場花圃", lat: 24.1858, lon: 120.5980, zone: "TH", flower: true },
        { name: "台糖湖濱生態園區", lat: 24.1848, lon: 120.6280, zone: "TH", flower: true },
        { name: "潮洋環保公園", lat: 24.1770, lon: 120.6360, zone: "TH", flower: true },

        // 中 / 西區市中心 (CENTRAL)
        { name: "台中火車站", lat: 24.1369, lon: 120.6857, zone: "CENTRAL" },
        { name: "宮原眼科", lat: 24.1380, lon: 120.6855, zone: "CENTRAL" },
        { name: "第四信用合作社", lat: 24.1418, lon: 120.6792, zone: "CENTRAL" },
        { name: "台中公園湖心亭", lat: 24.1449, lon: 120.6847, zone: "CENTRAL", flower: true },
        { name: "綠川水岸廊道", lat: 24.1385, lon: 120.6840, zone: "CENTRAL", flower: true },
        { name: "柳川水岸", lat: 24.1420, lon: 120.6760, zone: "CENTRAL", flower: true },
        { name: "一中街商圈", lat: 24.1500, lon: 120.6840, zone: "CENTRAL" },
        { name: "草悟道", lat: 24.1500, lon: 120.6640, zone: "CENTRAL", flower: true },
        { name: "審計新村", lat: 24.1470, lon: 120.6620, zone: "CENTRAL", flower: true },
        { name: "國立自然科學博物館", lat: 24.1580, lon: 120.6660, zone: "CENTRAL", flower: true },
        { name: "國立台灣美術館綠園道", lat: 24.1418, lon: 120.6640, zone: "CENTRAL", flower: true },
        { name: "台中州廳", lat: 24.1400, lon: 120.6770, zone: "CENTRAL" },
        { name: "台中文學館", lat: 24.1400, lon: 120.6690, zone: "CENTRAL", flower: true },
        { name: "台中孔廟", lat: 24.1570, lon: 120.6960, zone: "CENTRAL" },
        { name: "台中忠烈祠", lat: 24.1560, lon: 120.6958, zone: "CENTRAL" },
        { name: "文心森林公園", lat: 24.1490, lon: 120.6430, zone: "CENTRAL", flower: true },
        { name: "豐樂雕塑公園", lat: 24.1360, lon: 120.6440, zone: "CENTRAL", flower: true },
        { name: "東峰公園", lat: 24.1500, lon: 120.6970, zone: "CENTRAL", flower: true },
        { name: "旱溪樂成宮", lat: 24.1420, lon: 120.7010, zone: "CENTRAL" },
        { name: "國立中興大學", lat: 24.1228, lon: 120.6742, zone: "CENTRAL", flower: true },
        { name: "台中刑務所演武場", lat: 24.1400, lon: 120.6720, zone: "CENTRAL" },
        { name: "第五市場", lat: 24.1360, lon: 120.6710, zone: "CENTRAL" },

        // 南屯 / 北屯 (S / N)
        { name: "彩虹眷村", lat: 24.1340, lon: 120.6100, zone: "S" },
        { name: "南屯萬和宮", lat: 24.1370, lon: 120.6420, zone: "S" },
        { name: "豐富公園", lat: 24.1450, lon: 120.6480, zone: "S", flower: true },
        { name: "北屯兒童公園", lat: 24.1620, lon: 120.6900, zone: "N", flower: true },
        { name: "大坑9號步道口", lat: 24.1830, lon: 120.7480, zone: "N" },
        { name: "洲際棒球場", lat: 24.2000, lon: 120.6560, zone: "N" },

        // 花海遠征 (FLOWER) — 知名花田，多屬騎車/開車行程的稀有花種
        { name: "新社花海古堡", lat: 24.1900, lon: 120.8080, zone: "FLOWER", flower: true, special: true },
        { name: "中社觀光花市", lat: 24.3080, lon: 120.7250, zone: "FLOWER", flower: true, special: true },
        { name: "后里花田馬場", lat: 24.3040, lon: 120.7120, zone: "FLOWER", flower: true, special: true },
        { name: "外埔忘憂谷", lat: 24.3350, lon: 120.6600, zone: "FLOWER", flower: true, special: true }
    ];

    const baseBreakfasts = [
        { name: "東海別墅 上功早點", lat: 24.1806, lon: 120.6100 },
        { name: "逢甲 明倫蛋餅", lat: 24.1798, lon: 120.6455 },
        { name: "朝馬 麥味登秋紅谷店", lat: 24.1650, lon: 120.6410 },
        { name: "市政 晨間廚房", lat: 24.1620, lon: 120.6480 },
        { name: "水湳市場傳統早點", lat: 24.1990, lon: 120.6450 },
        { name: "台中肉蛋吐司(一中創始)", lat: 24.1505, lon: 120.6845 },
        { name: "老賴紅茶(第二市場)", lat: 24.1430, lon: 120.6800 },
        { name: "第五市場 樂群蚵仔粥", lat: 24.1360, lon: 120.6710 },
        { name: "建國市場 阿彬爌肉飯", lat: 24.1400, lon: 120.6900 },
        { name: "忠孝夜市 台中肉圓", lat: 24.1300, lon: 120.6790 },
        { name: "車頭 台中車站前早點", lat: 24.1372, lon: 120.6850 },
        { name: "洪瑞珍三明治大墩店", lat: 24.1470, lon: 120.6470 },
        { name: "美村路 樺珍包子", lat: 24.1490, lon: 120.6580 },
        { name: "草悟道 晨間輕食", lat: 24.1495, lon: 120.6650 },
        { name: "南屯老街 三角街肉圓早市", lat: 24.1370, lon: 120.6420 },
        { name: "興大 康橋早餐", lat: 24.1235, lon: 120.6755 },
        { name: "台中公園旁 天天饅頭", lat: 24.1442, lon: 120.6850 },
        { name: "北平路蛋餅北屯店", lat: 24.1620, lon: 120.6880 },
        { name: "東海藝術街 手作蛋餅", lat: 24.1832, lon: 120.6082 },
        { name: "文心森林公園旁 元氣早餐", lat: 24.1492, lon: 120.6435 }
    ];

    // 為每個地標周邊補一份在地早點，讓終點總能就近吃到
    const allBreakfasts = [...baseBreakfasts];
    landmarkPool.forEach((lm, index) => {
        if (!lm.special && index % 3 === 0) {
            allBreakfasts.push({
                name: lm.name + " 周邊在地早點",
                lat: lm.lat + (Math.random() - 0.5) * 0.004,
                lon: lm.lon + (Math.random() - 0.5) * 0.004
            });
        }
    });

    // 花朵圖鑑：一般花 & 稀有花（花園景點）
    const commonFlowers = [
        { e: "🌼", n: "雛菊" }, { e: "🌷", n: "鬱金香" }, { e: "🌸", n: "櫻花" }, { e: "🌺", n: "扶桑花" },
        { e: "🌻", n: "向日葵" }, { e: "🏵️", n: "萬壽菊" }, { e: "💐", n: "洋甘菊" }, { e: "🌹", n: "玫瑰" }
    ];
    const rareFlowers = [
        { e: "🌸", n: "限定櫻吹雪" }, { e: "💜", n: "薰衣草田" }, { e: "🌺", n: "九重葛花牆" },
        { e: "🌻", n: "向日葵花海" }, { e: "🏵️", n: "波斯菊花海" }
    ];

    function hashStr(s) {
        let h = 0;
        for (let i = 0; i < s.length; i++) { h = (h * 31 + s.charCodeAt(i)) >>> 0; }
        return h;
    }
    function flowerFor(lm) {
        if (lm.flower) {
            const r = rareFlowers[hashStr(lm.name) % rareFlowers.length];
            return { emoji: r.e, name: r.n, rare: true };
        }
        const c = commonFlowers[hashStr(lm.name) % commonFlowers.length];
        return { emoji: c.e, name: c.n, rare: false };
    }

    const nameAdjs = ["究極", "幻之", "沉浸式", "高能", "佛系", "硬核", "絕絕子", "逆天", "燃脂", "飆速", "熱血", "花漾", "極限", "探索"];
    const nameNouns = ["大暴走", "特搜巡禮", "種花之旅", "花園拉練", "大冒險", "狂飆路線", "花海制霸", "拉練", "制霸", "任務", "突圍"];

    let finalRouteNames = [];

    function getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                  Math.sin(dLon/2) * Math.sin(dLon/2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return R * c;
    }

    function generateDynamicRoute() {
        const mode = document.getElementById('kmSelect').value;

        let targetStraightKm, maxPoints, allowedZones;
        // 雙軌探索：短程死守東海/西屯，長程跨進台中市區花園
        if (mode === "5")       { targetStraightKm = 3.6;  maxPoints = 5; allowedZones = ["TH"]; }
        else if (mode === "8")  { targetStraightKm = 6.0;  maxPoints = 7; allowedZones = ["TH"]; }
        else if (mode === "10") { targetStraightKm = 7.8;  maxPoints = 8; allowedZones = ["TH", "CENTRAL", "S"]; }
        else                    { targetStraightKm = 11.5; maxPoints = 9; allowedZones = ["TH", "CENTRAL", "N", "S"]; }

        // 跑步路線只走跑得到的分區；遠方知名花海（新社/后里/中社/外埔）留給花園圖鑑
        let pool = landmarkPool.filter(p => allowedZones.includes(p.zone));

        let currentLat = START.lat;
        let currentLon = START.lon;
        let totalDistance = 0;
        let selectedPoints = [];
        finalRouteNames = [];
        let visited = [{ lat: currentLat, lon: currentLon }];
        let used = new Set();

        while (selectedPoints.length < maxPoints && totalDistance < targetStraightKm) {
            let slotsLeft = maxPoints - selectedPoints.length;
            let desiredStep = Math.max(0.6, (targetStraightKm - totalDistance) / slotsLeft);

            let candidates = pool.filter(p =>
                !used.has(p.name) &&
                !visited.some(v => getDistance(p.lat, p.lon, v.lat, v.lon) < 0.45)
            );
            if (candidates.length === 0) break;

            // 依「跳躍距離最接近理想步長」排序，能自動跨過地標稀疏的空檔
            candidates.sort((a, b) =>
                Math.abs(getDistance(currentLat, currentLon, a.lat, a.lon) - desiredStep) -
                Math.abs(getDistance(currentLat, currentLon, b.lat, b.lon) - desiredStep)
            );
            // 先把跳點控制在合理步長內（關卡數才夠、距離才不會爆量）；真的沒有再放寬跨空檔
            let windowed = candidates.filter(c => {
                let d = getDistance(currentLat, currentLon, c.lat, c.lon);
                return d >= desiredStep * 0.45 && d <= desiredStep * 1.7;
            });
            let base = windowed.length > 0 ? windowed : candidates;
            let topK = base.slice(0, Math.min(6, base.length));

            // 種花引導：多數關卡優先落在有花的花園景點
            let flowerTop = topK.filter(c => c.flower);
            let pickFrom = (flowerTop.length > 0 && Math.random() < 0.6) ? flowerTop : topK;

            let chosen = pickFrom[Math.floor(Math.random() * pickFrom.length)];
            let dist = getDistance(currentLat, currentLon, chosen.lat, chosen.lon);
            let bloom = flowerFor(chosen);

            totalDistance += dist;
            selectedPoints.push({ name: chosen.name, dist: dist.toFixed(1), flower: bloom });
            finalRouteNames.push(chosen.name);
            used.add(chosen.name);

            currentLat = chosen.lat;
            currentLon = chosen.lon;
            visited.push({ lat: currentLat, lon: currentLon });
        }

        let nearbyBreakfasts = allBreakfasts.filter(b => getDistance(currentLat, currentLon, b.lat, b.lon) <= 0.6);
        if (nearbyBreakfasts.length === 0) {
            nearbyBreakfasts = allBreakfasts.filter(b => getDistance(currentLat, currentLon, b.lat, b.lon) <= 1.2);
        }
        if (nearbyBreakfasts.length === 0) {
            nearbyBreakfasts = [...allBreakfasts].sort((a, b) =>
                getDistance(currentLat, currentLon, a.lat, a.lon) - getDistance(currentLat, currentLon, b.lat, b.lon)
            ).slice(0, 1);
        }

        let chosenBreakfast = nearbyBreakfasts[Math.floor(Math.random() * nearbyBreakfasts.length)];
        let bDist = getDistance(currentLat, currentLon, chosenBreakfast.lat, chosenBreakfast.lon);

        let randomName = nameAdjs[Math.floor(Math.random() * nameAdjs.length)] + nameNouns[Math.floor(Math.random() * nameNouns.length)];

        renderRouteCard({
            mode: mode,
            name: randomName,
            total: totalDistance,
            points: selectedPoints,
            breakfast: { name: chosenBreakfast.name, meters: Math.round(bDist * 1000) }
        });
    }

    function openGoogleMaps() {
        if (finalRouteNames.length === 0) return;
        const origin = encodeURIComponent("台中 " + START.name);
        const destination = encodeURIComponent("台中 " + finalRouteNames[finalRouteNames.length - 1]);
        let waypointsArr = [];
        for (let i = 0; i < finalRouteNames.length - 1; i++) {
            waypointsArr.push(encodeURIComponent("台中 " + finalRouteNames[i]));
        }
        const waypoints = waypointsArr.join('|');
        const url = `https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${destination}&waypoints=${waypoints}&travelmode=walking`;
        window.open(url, '_blank');
    }

    /* ---------- 分享路線（把整條路線編碼進網址，好友可開到同一張任務卡） ---------- */
    const PUBLIC_URL = "https://phslinco-cyber.github.io/city-orienteering-taipei/";
    let lastRouteData = null;

    function renderRouteCard(data, opts) {
        opts = opts || {};
        lastRouteData = data;
        finalRouteNames = data.points.map(p => p.name);
        currentBlooms = data.points.map(p => p.flower);

        const flowerBar = data.points.map(p => p.flower.emoji).join(" ");
        let htmlContent = `
            ${opts.shared ? '<div class="shared-banner">👀 朋友分享給你的種花路線！按「生成」可換一張新的。</div>' : ''}
            <div class="stats-badge">📜 ${data.name} (直線累積 ${Number(data.total).toFixed(1)}K)</div>
            <div class="warning-text">
                ⚠️ 貼心提醒：加上街道折返，實際跑量約為直線的 1.15~1.2 倍。<br>
                今天這趟跑完，手錶剛好會跳到 ${data.mode} 公里左右喔！
            </div>
            <ul class="point-list">
                <li class="point-item">
                    <span class="p-name">📍 起點：${START.name}</span>
                    <span class="p-dist">START</span>
                </li>
        `;
        data.points.forEach((p, index) => {
            htmlContent += `
                <li class="point-item">
                    <span class="p-name">📸 CP ${index + 1}：${p.name}<br>
                        <span class="p-flower">${p.flower.emoji} 種下 ${p.flower.name}${p.flower.rare ? "（稀有）" : ""}</span>
                    </span>
                    <span class="p-dist">+${p.dist}K</span>
                </li>
            `;
        });
        htmlContent += `
            </ul>
            <div class="flower-summary">
                🌱 本次可種下 ${data.points.length} 朵花：${flowerBar}
            </div>
            <div class="breakfast-box">
                🍳 終點補給：${data.breakfast.name}<br>
                <span style="font-size: 0.82em; color: #f1f2f6;">(距離最後一站僅 ${data.breakfast.meters} 公尺，馬上吃到！)</span>
            </div>
        `;

        const displayDiv = document.getElementById('routeDisplay');
        const googleBtn = document.getElementById('googleBtn');
        const plantBtn = document.getElementById('plantBtn');
        const shareBtn = document.getElementById('shareBtn');

        displayDiv.style.display = 'none';
        googleBtn.style.display = 'none';
        plantBtn.style.display = 'none';
        shareBtn.style.display = 'none';
        plantBtn.disabled = false;
        plantBtn.textContent = '🌱 完成路線・種下這趟的花';

        setTimeout(() => {
            displayDiv.innerHTML = htmlContent;
            displayDiv.style.display = 'block';
            plantBtn.style.display = 'block';
            shareBtn.style.display = 'block';
            googleBtn.style.display = 'block';
        }, 50);
    }

    function buildShareUrl(data) {
        const payload = {
            m: data.mode,
            n: data.name,
            t: Number(Number(data.total).toFixed(2)),
            p: data.points.map(p => ({ c: p.name, d: p.dist, e: p.flower.emoji, f: p.flower.name, r: p.flower.rare ? 1 : 0 })),
            b: data.breakfast.name,
            bd: data.breakfast.meters
        };
        const b64 = btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
        return PUBLIC_URL + "#r=" + b64;
    }

    function decodeShared() {
        const h = location.hash || '';
        const m = h.match(/[#&]r=([^&]+)/);
        if (!m) return null;
        try {
            const payload = JSON.parse(decodeURIComponent(escape(atob(m[1]))));
            if (!payload || !Array.isArray(payload.p)) return null;
            return {
                mode: String(payload.m),
                name: payload.n,
                total: Number(payload.t),
                points: payload.p.map(x => ({ name: x.c, dist: x.d, flower: { emoji: x.e, name: x.f, rare: !!x.r } })),
                breakfast: { name: payload.b, meters: payload.bd }
            };
        } catch (e) { return null; }
    }

    function shareRoute() {
        if (!lastRouteData) return;
        const url = buildShareUrl(lastRouteData);
        if (navigator.share) {
            navigator.share({ title: "台中種花定向盲盒", text: "來跑我的種花路線，一起收集花朵吧！🌻", url }).catch(() => {});
            return;
        }
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(url)
                .then(() => showToast("🔗 連結已複製！貼給朋友即可"))
                .catch(() => window.prompt("複製這個連結分享給朋友：", url));
        } else {
            window.prompt("複製這個連結分享給朋友：", url);
        }
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        if (!t) return;
        t.textContent = msg;
        t.style.display = 'block';
        clearTimeout(window.__toastTimer);
        window.__toastTimer = setTimeout(() => { t.style.display = 'none'; }, 2600);
    }

    /* ---------- 花園收集系統（localStorage） ---------- */
    const GARDEN_KEY = 'taichungGardenV1';
    let currentBlooms = [];
    const codexSpots = landmarkPool.filter(p => p.special);

    function getGarden() {
        let g;
        try { g = JSON.parse(localStorage.getItem(GARDEN_KEY)); } catch (e) { g = null; }
        g = g || {};
        return {
            flowers: g.flowers || {},
            totalPlanted: g.totalPlanted || 0,
            routesDone: g.routesDone || 0,
            rareUnlocked: g.rareUnlocked || {}
        };
    }
    function saveGarden(g) { localStorage.setItem(GARDEN_KEY, JSON.stringify(g)); }

    function levelInfo(total) {
        const titles = ['種子', '發芽', '花苗', '小花圃', '花園', '花海', '花海達人'];
        const lvl = Math.floor(total / 12);
        return {
            level: lvl + 1,
            title: titles[Math.min(lvl, titles.length - 1)],
            toNext: Math.max(0, (lvl + 1) * 12 - total)
        };
    }

    function plantCurrentRoute() {
        if (!currentBlooms.length) return;
        const g = getGarden();
        currentBlooms.forEach(b => {
            const key = b.emoji + ' ' + b.name;
            g.flowers[key] = (g.flowers[key] || 0) + 1;
            g.totalPlanted += 1;
        });
        g.routesDone += 1;
        saveGarden(g);
        currentBlooms = [];
        const btn = document.getElementById('plantBtn');
        btn.disabled = true;
        btn.textContent = '🌸 已種下！再生成一張新任務卡吧';
        renderGarden();
    }

    function unlockRare(name, emoji, flowerName) {
        const g = getGarden();
        if (g.rareUnlocked[name]) return;
        g.rareUnlocked[name] = true;
        const key = emoji + ' ' + flowerName;
        g.flowers[key] = (g.flowers[key] || 0) + 1;
        g.totalPlanted += 1;
        saveGarden(g);
        renderGarden();
        renderCodex();
    }

    function resetGarden() {
        if (confirm('確定要清空花園嗎？此動作無法復原。')) {
            localStorage.removeItem(GARDEN_KEY);
            renderGarden();
            renderCodex();
        }
    }

    function renderGarden() {
        const g = getGarden();
        const li = levelInfo(g.totalPlanted);
        const entries = Object.entries(g.flowers).sort((a, b) => b[1] - a[1]);

        let bed = '', shown = 0;
        for (const [k, c] of entries) {
            const emoji = k.split(' ')[0];
            for (let i = 0; i < c && shown < 60; i++) { bed += emoji; shown++; }
        }
        if (!bed) bed = '🟫🟫🟫🟫🟫🟫🟫🟫<br><span style="font-size:0.6em;color:#8a8f99;">空空的花圃，快跑一趟種花吧！</span>';

        const speciesHtml = entries.length
            ? entries.map(([k, c]) => `<span class="species">${k} ×${c}</span>`).join('')
            : '<span class="species-empty">尚未收集任何花朵</span>';

        document.getElementById('gardenPanel').innerHTML = `
            <div class="garden-head">
                <span class="garden-title">🌼 我的花園</span>
                <span class="garden-lvl">Lv.${li.level} ${li.title}</span>
            </div>
            <div class="garden-stats">
                已種 <b>${g.totalPlanted}</b> 朵 ・ 完成 <b>${g.routesDone}</b> 趟 ・ 花種 <b>${entries.length}</b> 種<br>
                <span class="garden-next">再種 ${li.toNext} 朵即可升級 →</span>
            </div>
            <div class="flower-bed">${bed}</div>
            <div class="species-list">${speciesHtml}</div>
            <button class="btn-reset" onclick="resetGarden()">🗑️ 清空花園</button>
        `;
    }

    function renderCodex() {
        const g = getGarden();
        const items = codexSpots.map(p => {
            const b = flowerFor(p);
            const unlocked = !!g.rareUnlocked[p.name];
            return `
                <div class="codex-item ${unlocked ? 'unlocked' : ''}">
                    <span class="codex-name">${unlocked ? b.emoji : '🔒'} ${p.name}</span>
                    ${unlocked
                        ? `<span class="codex-flower">已收藏 ${b.emoji}${b.name}</span>`
                        : `<button class="btn-unlock" onclick="unlockRare('${p.name}','${b.emoji}','${b.name}')">🚴 我去過，解鎖</button>`}
                </div>`;
        }).join('');
        document.getElementById('codexBox').innerHTML =
            `<div class="codex-title">🚴 台中花海圖鑑（遠方花田・騎車或開車解鎖）</div>${items}`;
    }

    renderGarden();
    renderCodex();

    (function initShared() {
        const shared = decodeShared();
        if (shared) {
            const sel = document.getElementById('kmSelect');
            if (sel && shared.mode) sel.value = shared.mode;
            renderRouteCard(shared, { shared: true });
        }
    })();
</script>
